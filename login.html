<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const supabaseClient = createClient(
      "https://dqfpxfqfhduzrobupenq.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxZnB4ZnFmaGR1enJvYnVwZW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTU2MTAsImV4cCI6MjA4NzkzMTYxMH0.Crs6dYz0ddR7YgPCejEHNCCi0apniaeD_AThxFZ259c"
    );
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .login-box {
      width: 320px;
      margin: 120px auto;
      padding: 25px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      color: red;
      min-height: 20px;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>登入 / 註冊</h2>

  <input id="username" placeholder="用戶名稱 Username">
  <input id="password" type="password" placeholder="密碼 Password">

  <button onclick="login()">登入 / 建立新用戶</button>

  <div id="msg"></div>
</div>

<script>
async function login() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!username || !password) {
    msg.textContent = "請輸入用戶名稱和密碼。";
    return;
  }

  // 1) 檢查用戶是否存在
  const { data: user, error: selectError } = await supabaseClient
    .from("users")
    .select("*")
    .eq("userid", username)
    .maybeSingle();

  if (selectError) {
    msg.textContent = "伺服器錯誤，請稍後再試。";
    console.error(selectError);
    return;
  }

  // 2) 用戶存在 → 檢查密碼
  if (user) {
    if (user.password !== password) {
      msg.textContent = "密碼錯誤。";
      return;
    }

    // 登入成功
    localStorage.setItem("currentUser", username);
    window.location.href = "index.html";
    return;
  }

  // 3) 用戶不存在 → 自動建立新用戶
  const { error: insertError } = await supabaseClient
    .from("users")
    .insert({
      userid: username,
      password: password
    });

  if (insertError) {
    msg.textContent = "建立新用戶失敗。";
    console.error(insertError);
    return;
  }

  // 新用戶建立成功 → 自動登入
  localStorage.setItem("currentUser", username);
  window.location.href = "index.html";
}
</script>

</body>
</html>
